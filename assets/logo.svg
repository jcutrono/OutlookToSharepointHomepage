<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.2" baseProfile="tiny-ps" xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 192 192" width="192" height="192">
  <title>File My Email</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1b6ec2"/>
      <stop offset="40%" stop-color="#127d9e"/>
      <stop offset="100%" stop-color="#0d7377"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>

  <!-- @ symbol - bold, positioned center-left to leave room for trails -->
  <text x="74" y="136"
        font-family="'Segoe UI', Arial, Helvetica, sans-serif"
        font-weight="bold" font-size="105"
        fill="white" text-anchor="middle">@</text>

  <!-- Motion trails: line terminates at arrow base, group opacity matches both -->
  <!-- Top trail - starts attached to @, curves up-right -->
  <g opacity="0.85">
    <path d="M 106 76 C 116 72 128 66 137 61" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M 134 56 L 149 54 L 140 66 Z" fill="white"/>
  </g>
  <!-- Middle trail - straight horizontal from @ edge -->
  <g opacity="0.65">
    <path d="M 114 94 L 142 94" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 142 88 L 156 94 L 142 100 Z" fill="white"/>
  </g>
  <!-- Bottom trail - curves down-right -->
  <g opacity="0.45">
    <path d="M 108 114 C 118 118 129 124 137 128" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M 139 122 L 150 133 L 135 133 Z" fill="white"/>
  </g>
</svg>
